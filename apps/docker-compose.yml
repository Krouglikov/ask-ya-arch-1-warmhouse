version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smarthome-postgres
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres" ] # check if postgres is ready
      timeout: 45s
      interval: 10s
      retries: 10
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarthome
    volumes:
      - ./smart_home/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
    networks:
      - smarthome-network

  temperature-api:
    build:
      context: ./temperature_api
      dockerfile: Dockerfile
    container_name: smarthome-temperature-api
    ports:
      - 8081:8081
    restart: unless-stopped
    networks:
      - smarthome-network

  registration:
    build:
      context: ./registration
      dockerfile: Dockerfile
    container_name: smarthome-registration
    environment:
      - SMART_HOME_API_URL=http://app:8080/api/v1
    depends_on:
      app:
        condition: service_started
    ports:
      - 8082:8080
    restart: unless-stopped
    networks:
      - smarthome-network

  control:
    build:
      context: ./control
      dockerfile: Dockerfile
    container_name: smarthome-control
    ports:
      - 8083:8080
    depends_on:
      temperature-api:
        condition: service_started
    environment:
      - EXTERNAL_API_URL=http://temperature-api:8081
    restart: unless-stopped
    networks:
      - smarthome-network

  app:
    build:
      context: ./smart_home
      dockerfile: Dockerfile
    container_name: smarthome-app
    depends_on:
      postgres:
        condition: service_healthy
      control:
        condition: service_started
      temperature-api:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/smarthome
      - TEMPERATURE_API_URL=http://control:8080/api
    ports:
      - 8080:8080
    restart: unless-stopped
    networks:
      - smarthome-network

volumes:
  postgres_data:

networks:
  smarthome-network:
    driver: bridge